<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="noindex, nofollow">

<title>Risk & Compliance Portfolio</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<script>
if (sessionStorage.getItem("access") !== "granted") {
  window.location.href = "login.html";
}
</script>

<div class="container">

<header>

<h1>Enterprise Risk & Compliance Portfolio</h1>

<p>
Governance, risk management, compliance programs,
and analytics frameworks.
</p>

</header>


<section>

<h2>Risk Register Demo</h2>
<h3>Risk Heat Map</h3>

<div id="heatmap"></div>
<p>
Example of structured risk data rendered dynamically.
</p>

<!-- THIS is where the JavaScript inserts your risk cards -->
<h3>Searchable Risk Register</h3>

<label for="riskSearch"><strong>Search:</strong></label>
<input id="riskSearch" type="search" placeholder="Search risk, owner, mitigation…" />

<div class="table-wrap" role="region" aria-label="Risk register table">
  <table id="riskTable">
    <thead>
      <tr>
        <th><button class="thbtn" data-sort="risk">Risk</button></th>
        <th><button class="thbtn" data-sort="impact">Impact</button></th>
        <th><button class="thbtn" data-sort="probability">Probability</button></th>
        <th><button class="thbtn" data-sort="severity">Severity</button></th>
        <th><button class="thbtn" data-sort="owner">Owner</button></th>
      </tr>
    </thead>
    <tbody id="riskTbody"></tbody>
  </table>
</div>
<div id="risk-data"></div>

</section>


<footer>

<button onclick="sessionStorage.removeItem('access'); window.location.href='login.html';">
Log out
</button>

</footer>

</div>

<script src="js/script.js"></script>

</body>
</html>
