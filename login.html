<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Access</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2>Portfolio Access</h2>
<p>Enter access code</p>

<input type="password" id="code">
<button onclick="check()">Enter</button>

<p id="msg"></p>

<script>

const ACCESS_CODE = "risklab2026";

function check(){

let entered = document.getElementById("code").value;

if(entered === ACCESS_CODE){

sessionStorage.setItem("access","granted");

window.location.href="index.html";

}else{

document.getElementById("msg").innerText="Incorrect code";

}

}

</script>

</body>

  <section>

  </section>
</div>
</html>
